<svg xmlns="http://www.w3.org/2000/svg" width="144" height="144" viewBox="0 0 144 144">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5.76" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="144" height="144" fill="url(#bg)"/>
  
  <!-- Glow circle -->
  <circle cx="72" cy="72" r="49.248" fill="url(#glow)" opacity="0.6"/>
  
  <!-- Lightning bolt (⚡) -->
  <g transform="translate(72, 72)" filter="url(#glowFilter)">
    <!-- Outer glow copy -->
    <path 
      d="M -10.368 -49.248
         L -31.104 5.184
         L -5.184 5.184
         L -18.144000000000002 49.248
         L 28.512 -12.96
         L 5.184 -12.96
         L 25.92 -49.248
         Z"
      fill="#a78bfa" opacity="0.3"
      transform="scale(1.15)"
    />
    <!-- Main bolt -->
    <path 
      d="M -10.368 -49.248
         L -31.104 5.184
         L -5.184 5.184
         L -18.144000000000002 49.248
         L 28.512 -12.96
         L 5.184 -12.96
         L 25.92 -49.248
         Z"
      fill="url(#bolt)"
    />
  </g>
  
  <!-- Sparkle dots -->
  <circle cx="113.47200000000001" cy="33.120000000000005" r="2.5919999999999996" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="33.120000000000005" cy="108.28800000000001" r="1.728" fill="#a78bfa" opacity="0.6"/>
  <circle cx="104.4" cy="117.35999999999999" r="1.2959999999999998" fill="#818cf8" opacity="0.5"/>
</svg>