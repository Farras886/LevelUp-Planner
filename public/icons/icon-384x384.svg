<svg xmlns="http://www.w3.org/2000/svg" width="384" height="384" viewBox="0 0 384 384">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15.36" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="384" height="384" fill="url(#bg)"/>
  
  <!-- Glow circle -->
  <circle cx="192" cy="192" r="131.328" fill="url(#glow)" opacity="0.6"/>
  
  <!-- Lightning bolt (⚡) -->
  <g transform="translate(192, 192)" filter="url(#glowFilter)">
    <!-- Outer glow copy -->
    <path 
      d="M -27.648000000000003 -131.328
         L -82.944 13.824000000000002
         L -13.824000000000002 13.824000000000002
         L -48.38400000000001 131.328
         L 76.03200000000001 -34.56
         L 13.824000000000002 -34.56
         L 69.12 -131.328
         Z"
      fill="#a78bfa" opacity="0.3"
      transform="scale(1.15)"
    />
    <!-- Main bolt -->
    <path 
      d="M -27.648000000000003 -131.328
         L -82.944 13.824000000000002
         L -13.824000000000002 13.824000000000002
         L -48.38400000000001 131.328
         L 76.03200000000001 -34.56
         L 13.824000000000002 -34.56
         L 69.12 -131.328
         Z"
      fill="url(#bolt)"
    />
  </g>
  
  <!-- Sparkle dots -->
  <circle cx="302.592" cy="88.32" r="6.911999999999999" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="88.32" cy="288.76800000000003" r="4.6080000000000005" fill="#a78bfa" opacity="0.6"/>
  <circle cx="278.4" cy="312.96" r="3.4559999999999995" fill="#818cf8" opacity="0.5"/>
</svg>