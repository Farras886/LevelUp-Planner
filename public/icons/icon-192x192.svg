<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7.68" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" fill="url(#bg)"/>
  
  <!-- Glow circle -->
  <circle cx="96" cy="96" r="65.664" fill="url(#glow)" opacity="0.6"/>
  
  <!-- Lightning bolt (⚡) -->
  <g transform="translate(96, 96)" filter="url(#glowFilter)">
    <!-- Outer glow copy -->
    <path 
      d="M -13.824000000000002 -65.664
         L -41.472 6.912000000000001
         L -6.912000000000001 6.912000000000001
         L -24.192000000000004 65.664
         L 38.016000000000005 -17.28
         L 6.912000000000001 -17.28
         L 34.56 -65.664
         Z"
      fill="#a78bfa" opacity="0.3"
      transform="scale(1.15)"
    />
    <!-- Main bolt -->
    <path 
      d="M -13.824000000000002 -65.664
         L -41.472 6.912000000000001
         L -6.912000000000001 6.912000000000001
         L -24.192000000000004 65.664
         L 38.016000000000005 -17.28
         L 6.912000000000001 -17.28
         L 34.56 -65.664
         Z"
      fill="url(#bolt)"
    />
  </g>
  
  <!-- Sparkle dots -->
  <circle cx="151.296" cy="44.16" r="3.4559999999999995" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="44.16" cy="144.38400000000001" r="2.3040000000000003" fill="#a78bfa" opacity="0.6"/>
  <circle cx="139.2" cy="156.48" r="1.7279999999999998" fill="#818cf8" opacity="0.5"/>
</svg>