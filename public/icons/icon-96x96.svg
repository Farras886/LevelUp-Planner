<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </linearGradient>
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.84" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="96" height="96" fill="url(#bg)"/>
  
  <!-- Glow circle -->
  <circle cx="48" cy="48" r="32.832" fill="url(#glow)" opacity="0.6"/>
  
  <!-- Lightning bolt (⚡) -->
  <g transform="translate(48, 48)" filter="url(#glowFilter)">
    <!-- Outer glow copy -->
    <path 
      d="M -6.912000000000001 -32.832
         L -20.736 3.4560000000000004
         L -3.4560000000000004 3.4560000000000004
         L -12.096000000000002 32.832
         L 19.008000000000003 -8.64
         L 3.4560000000000004 -8.64
         L 17.28 -32.832
         Z"
      fill="#a78bfa" opacity="0.3"
      transform="scale(1.15)"
    />
    <!-- Main bolt -->
    <path 
      d="M -6.912000000000001 -32.832
         L -20.736 3.4560000000000004
         L -3.4560000000000004 3.4560000000000004
         L -12.096000000000002 32.832
         L 19.008000000000003 -8.64
         L 3.4560000000000004 -8.64
         L 17.28 -32.832
         Z"
      fill="url(#bolt)"
    />
  </g>
  
  <!-- Sparkle dots -->
  <circle cx="75.648" cy="22.08" r="1.7279999999999998" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="22.08" cy="72.19200000000001" r="1.1520000000000001" fill="#a78bfa" opacity="0.6"/>
  <circle cx="69.6" cy="78.24" r="0.8639999999999999" fill="#818cf8" opacity="0.5"/>
</svg>